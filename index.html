:root{
  --primary:#6c63ff;
  --secondary:#00e5ff;
  --accent:#ff4ecd;

  --bg:#f8f9ff;
  --card:#ffffff;
  --text:#0f0f1a;
  --text-soft:#555577;

  --border:#e6e6ff;
  --success:#00d084;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#ffffff,#f4f6ff);
color:var(--text);
font-family:'Manrope',sans-serif;
padding:20px;
line-height:1.6;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
}

/* LIVE BAR */

.live-bar{
background:#ffffff;
border:1px solid var(--border);
border-radius:14px;
padding:14px 22px;

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;

box-shadow:
0 10px 30px rgba(0,0,0,0.06),
0 0 20px rgba(108,99,255,0.1);
}

.viewer-count{
font-weight:700;
color:var(--primary);
font-size:1.1rem;
}

/* SUPPORT BUTTON */

.support-btn{
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
text-decoration:none;
padding:9px 18px;
border-radius:40px;
font-weight:600;

display:inline-flex;
align-items:center;
gap:8px;

transition:.25s;
box-shadow:0 6px 18px rgba(108,99,255,0.35);
}

.support-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 22px rgba(108,99,255,0.5);
}

/* OFFER SECTION */

.custom-offer{
display:flex;
gap:18px;
margin:30px 0;
flex-wrap:wrap;
}

.offer-card{
background:#ffffff;
border-radius:18px;
padding:22px;

flex:1;
min-width:260px;
text-align:center;

border:1px solid var(--border);

box-shadow:
0 8px 24px rgba(0,0,0,0.06);
}

.offer-card h3{
margin-bottom:10px;
color:var(--primary);
font-size:1.2rem;
}

.offer-card p{
color:var(--text-soft);
font-size:.95rem;
}

/* INPUTS */

.offer-card textarea,
.offer-card input{

width:100%;
background:#f5f6ff;

border:1px solid var(--border);
border-radius:12px;

padding:14px;
margin-top:12px;

font-size:.95rem;
outline:none;

transition:.25s;
}

.offer-card textarea:focus,
.offer-card input:focus{

border-color:var(--primary);
box-shadow:0 0 0 3px rgba(108,99,255,0.15);

background:#fff;
}

/* BUTTON TELEGRAM */

.telegram-btn{

background:linear-gradient(135deg,var(--primary),var(--accent));

color:white;
border:none;

padding:12px 20px;
border-radius:40px;

font-weight:700;
font-size:1rem;

width:100%;
margin-top:14px;

cursor:pointer;

transition:.25s;
box-shadow:0 6px 18px rgba(108,99,255,0.35);
}

.telegram-btn:hover{

transform:translateY(-2px) scale(1.03);
box-shadow:0 10px 28px rgba(108,99,255,0.5);
}

/* PRODUCTS GRID */

.products-grid{
display:grid;
grid-template-columns:1fr;
gap:26px;
}

@media(min-width:810px){
.products-grid{
grid-template-columns:repeat(2,1fr);
}
}

/* PRODUCT CARD */

.product-card{

background:#ffffff;

border-radius:18px;
overflow:hidden;

border:1px solid var(--border);

box-shadow:
0 8px 28px rgba(0,0,0,0.07);

transition:.25s;
}

.product-card:hover{

transform:translateY(-6px);
box-shadow:
0 12px 36px rgba(108,99,255,0.25);
}

/* HEADER */

.product-header{
padding:20px;
background:linear-gradient(135deg,#ffffff,#f4f6ff);
position:relative;
}

.product-title{
font-family:'Salsa',cursive;
font-size:1.7rem;
color:var(--text);
}

/* BADGE */

.best-seller-badge{

position:absolute;
top:16px;
right:16px;

background:linear-gradient(135deg,#ffcc00,#ff6a00);

padding:5px 14px;
border-radius:30px;

font-size:.8rem;
font-weight:700;
color:#000;

box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* MEDIA */

.product-media,
.product-video{

width:100%;
display:block;
}

.product-video{
aspect-ratio:16/9;
object-fit:cover;
}

/* DESCRIPTION */

.product-desc{

padding:20px;

font-size:.95rem;
color:var(--text-soft);
}

.product-desc ul{
list-style:none;
}

.product-desc ul li::before{

content:"✓ ";
color:var(--success);
font-weight:700;
}

/* BUY BUTTON */

.buy-btn{

display:block;

background:linear-gradient(135deg,var(--primary),var(--accent));

color:white;
text-decoration:none;

padding:14px;
margin:15px 20px 22px;

border-radius:40px;

font-weight:700;
font-size:1.05rem;

text-align:center;

border:none;
cursor:pointer;

transition:.25s;
box-shadow:0 8px 20px rgba(108,99,255,0.35);
}

.buy-btn:hover{

transform:scale(1.04);
box-shadow:0 10px 26px rgba(108,99,255,0.5);
}

/* NOTIFICATIONS */

#live-notifications{

position:fixed;
top:20px;
right:20px;
z-index:9999;
max-width:320px;
}

.notification-item{

background:#ffffff;

border-radius:12px;
padding:14px 18px;
margin-bottom:12px;

border-left:4px solid var(--primary);

box-shadow:0 10px 22px rgba(0,0,0,0.1);

animation:slideIn .4s,
fadeOut .8s 4s forwards;

font-size:.9rem;
}

.notification-item strong{
color:var(--primary);
}

/* ANIMATIONS */

@keyframes slideIn{

from{
transform:translateX(100%);
opacity:0;
}

to{
transform:translateX(0);
opacity:1;
}
}

@keyframes fadeOut{
to{
opacity:0;
transform:translateX(100%);
}
}

/* MOBILE */

@media(max-width:600px){

.product-title{
font-size:1.4rem;
}

.live-bar{
flex-direction:column;
text-align:center;
}
}
